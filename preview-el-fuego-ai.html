<style>
:root{
  --ember:#161310;--ember-2:#1e1813;--ember-card:#221b15;--ember-line:#352b22;
  --fuego:#E5231B;--flame:#FF7A2E;--gold:#F6B23C;--cream:#F6ECDF;--cream-dim:#cbbfae;--ash:#9b9080;
  --flame-grad:linear-gradient(105deg,#E5231B 0%,#FF6A2A 48%,#F6B23C 100%);
  --shadow-glow:0 0 0 1px rgba(255,122,46,.18),0 22px 60px -28px rgba(229,35,27,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:var(--ember);color:var(--cream);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
h1,h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
.glow{position:fixed;width:560px;height:560px;border-radius:50%;filter:blur(100px);opacity:.4;background:radial-gradient(circle,rgba(229,35,27,.55),transparent 70%);top:-200px;right:-160px;z-index:0}
.glow.two{top:auto;bottom:-220px;right:auto;left:-180px;background:radial-gradient(circle,rgba(255,122,46,.4),transparent 70%)}
.card{position:relative;z-index:1;width:100%;max-width:420px;background:linear-gradient(165deg,var(--ember-card),var(--ember-2));border:1px solid var(--ember-line);border-radius:22px;padding:38px 32px;box-shadow:var(--shadow-glow)}
.brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:26px}
.brand img{height:54px}
.brand .eyebrow{font-family:"Space Mono",monospace;font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--flame)}
.card h1{font-size:1.7rem;text-align:center;margin-bottom:4px}
.card .sub{text-align:center;color:var(--ash);font-size:.9rem;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--cream-dim);margin-bottom:7px}
.field input{width:100%;background:var(--ember);border:1.5px solid var(--ember-line);border-radius:11px;padding:13px 15px;color:var(--cream);font-family:inherit;font-size:.95rem;transition:border-color .15s,box-shadow .15s}
.field input:focus{outline:none;border-color:var(--flame);box-shadow:0 0 0 3px rgba(255,122,46,.18)}
.row{display:flex;align-items:center;justify-content:space-between;margin:6px 0 22px;font-size:.84rem}
.row label{display:flex;align-items:center;gap:7px;color:var(--cream-dim);cursor:pointer}
.row a{color:var(--flame)}
.btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:1rem;border-radius:999px;padding:15px;cursor:pointer;border:none;font-family:inherit;background:var(--flame-grad);color:#1a0d05;box-shadow:0 14px 34px -12px rgba(255,106,42,.7);transition:transform .18s}
.btn:hover{transform:translateY(-2px)}
.alt{text-align:center;margin-top:22px;font-size:.86rem;color:var(--ash)}
.alt a{color:var(--flame);font-weight:600}
.back{position:fixed;top:20px;left:20px;z-index:2;font-size:.85rem;color:var(--cream-dim);display:inline-flex;align-items:center;gap:6px}
.back:hover{color:#fff}
.note{margin-top:18px;font-size:.72rem;color:var(--ash);text-align:center;line-height:1.5}
</style>
</head>
